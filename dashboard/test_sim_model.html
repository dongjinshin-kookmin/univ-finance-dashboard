<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>sim_model.js 검증 하니스</title>
<style>
  body { font: 14px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 900px; margin: 32px auto; padding: 0 16px; color: #1a1a1a; }
  h1 { font-size: 20px; } h2 { font-size: 15px; margin-top: 24px; }
  .case { border-left: 4px solid #ccc; padding: 8px 14px; margin: 10px 0; background: #f7f7f8; border-radius: 0 6px 6px 0; }
  .pass { border-color: #1a7f37; } .fail { border-color: #cf222e; }
  .tag { font-weight: 700; } .pass .tag { color: #1a7f37; } .fail .tag { color: #cf222e; }
  .detail { color: #555; font-size: 12.5px; margin-top: 4px; font-family: ui-monospace, monospace; }
  .summary { font-size: 16px; font-weight: 700; margin-top: 20px; padding: 12px; border-radius: 6px; }
  .summary.ok { background: #dafbe1; color: #1a7f37; } .summary.no { background: #ffebe9; color: #cf222e; }
  .note { color: #777; font-size: 12px; }
</style>
</head>
<body>
<h1>sim_model.js 검증 하니스 (브라우저)</h1>
<p class="note">임베드 픽스처(국민대 idx 52 + 대학원대학 no_ug)로 설계 스팟체크 4건을 실행한다.
전 학교 검증은 <code>node dashboard/test_sim_model.js</code>를 사용.</p>
<div id="out"></div>

<script src="src/sim_model.js"></script>
<script id="FIXTURE" type="application/json">
{"meta":{"defaults":{"beta":0.5,"gamma":0.15,"eta_5120":0.3,"dropout":0.0,"lambda_":0.0,"m_out":{"대학":4.0,"사이버대학":4.0,"전문대학":2.5,"대학원대학":4.0}},"price_cap":{"2016":0.0165,"2017":0.015,"2018":0.018,"2019":0.022,"2020":0.019,"2021":0.012,"2022":0.0165,"2023":0.0405,"2024":0.0564,"2025":0.0549,"2026":0.0319}},"kmu":{"base":{"c5111":1861442,"c5112":154744927,"c5120":7374975,"c5100":163981344,"c5210":2508000,"cOP_IN":238465678,"cT_IN":259950026,"c4100":101778260,"cOP_EX":233096445,"c4321":37687593,"c4322":35785372,"edu_cost":{"c4200":34747522,"c4300":96553940,"c4330":2806267,"c1317":2294514,"c1314":5197489}},"bt":null,"flags":{"year":2024,"status":"ok"},"seg":{"H_ug":14486.0,"H_grad":3571.0,"A_in":2963.0,"A_out":496.0,"Q":2966.0,"H_ug_in":12502.0,"H_ug_out":1984.0},"price":{"p_ug":7941.5833,"p_ug_src":"파생","rho_g":1.4},"surv":{"m_in":4.2194,"g":0.179906,"s_k":[1.0,1.0,1.0,1.0,0.179906,0.032366,0.005823,0.001048,0.000188]},"phi":{"in":0.6416,"out":0.1018,"grad":0.2566}},"kmu_name":"국민대학교","noug":{"base":{"c5111":38300,"c5112":1533220,"c5120":99717,"c5100":1671237,"c5210":60000,"cOP_IN":2028289,"cT_IN":2554212,"c4100":845502,"cOP_EX":1748178,"c4321":1680,"c4322":701395,"edu_cost":{"c4200":166281,"c4300":736393,"c4330":9570,"c1317":4964,"c1314":7380}},"bt":null,"flags":{"year":2024,"status":"no_ug"},"seg":{"H_ug":236.0,"H_grad":236.0,"A_in":43.0,"A_out":68.0,"Q":0.0,"H_ug_in":0.0,"H_ug_out":236.0},"price":{"p_ug":null,"p_ug_src":"없음(학부미보유)","rho_g":1.4},"surv":{"m_in":null,"g":null,"s_k":[]},"phi":{"in":0.0,"out":0.0,"grad":1.0}},"noug_name":"개신대학원대학교"}
</script>

<script>
(function () {
  'use strict';
  var FX = JSON.parse(document.getElementById('FIXTURE').textContent);
  var meta = FX.meta, kmu = FX.kmu, optsK = { meta: meta, sido: '서울' };
  var results = [];
  function check(name, pass, detail) { results.push({ name: name, pass: pass, detail: detail }); }
  function approx(a, b, rel) { return Math.abs(a - b) <= rel * Math.max(1, Math.abs(b)); }
  function maxAbs(a) { return a.reduce(function (m, x) { return Math.max(m, Math.abs(x || 0)); }, 0); }

  // (a) r=0 → 델타·KPI 0
  (function () {
    var proj = SIM.project(kmu, { r: 0, t0: 2025 }, optsK);
    var ks = SIM.recalcSeries(kmu, proj, { r: 0, t0: 2025 }, optsK);
    var maxD = maxAbs(proj.rows.map(function (r) { return r.d5100; }));
    var kD = 0; ks.forEach(function (k) { for (var n in k.delta) if (k.delta[n] != null) kD = Math.max(kD, Math.abs(k.delta[n])); });
    check('(a) r=0 → 델타·KPI델타 = 0', maxD === 0 && kD === 0, 'max|Δ수입|=' + maxD + ' max|ΔKPI|=' + kD);
  })();
  // (b) 정착 해석해
  (function () {
    var proj = SIM.project(kmu, { r: 0.10, t0: 2025, fillMode: 'conservative', piMode: 'freeze', horizon: 10 }, optsK);
    var exp = -0.10 * kmu.price.p_ug * kmu.surv.m_in * kmu.seg.A_in;
    var got = proj.rows[proj.rows.length - 1].d5112;
    check('(b) 정착 Δ5112 ≈ −0.10·p_ug·m_in·A_in', approx(got, exp, 0.01),
      'model=' + Math.round(got) + ' vs analytic=' + Math.round(exp) + ' (오차 ' + (100 * Math.abs(got - exp) / Math.abs(exp)).toFixed(3) + '%)');
  })();
  // (c) no_ug
  (function () {
    var e = FX.noug, proj = SIM.project(e, { r: 0.30, t0: 2025 }, { meta: meta, sido: '서울' });
    var ks = SIM.recalcSeries(e, proj, { r: 0.30, t0: 2025 }, { meta: meta });
    var maxD = maxAbs(proj.rows.map(function (r) { return r.d5100; }));
    var kD = 0; ks.forEach(function (k) { for (var n in k.delta) if (k.delta[n] != null) kD = Math.max(kD, Math.abs(k.delta[n])); });
    check('(c) no_ug 학교 델타 0 (' + FX.noug_name + ')', !proj.responsive && maxD === 0 && kD === 0,
      'responsive=' + proj.responsive + ' max|Δ수입|=' + maxD + ' max|ΔKPI|=' + kD);
  })();
  // (d) φ 경계
  (function () {
    var proj = SIM.project(kmu, { r: 1.0, t0: 2025, fillMode: 'conservative', piMode: 'freeze', horizon: 10 }, optsK);
    var bound = kmu.phi.in * (kmu.base.c5111 + kmu.base.c5112);
    var Rin = kmu.phi.in * kmu.base.c5112;
    var within = proj.rows.every(function (r) { return Math.abs(r.d5112) <= bound + 1; });
    var settled = -proj.rows[proj.rows.length - 1].d5112;
    check('(d) φ 경계 |Δ5112| ≤ φ_in·5110, r=1 → φ_in·5112', within && approx(settled, Rin, 0.01),
      'r=1정착손실=' + Math.round(settled) + ' vs R_in=' + Math.round(Rin) + ' | 경계 φ_in·5110=' + Math.round(bound));
  })();

  var out = document.getElementById('out'), pass = 0;
  results.forEach(function (r) {
    if (r.pass) pass++;
    var d = document.createElement('div');
    d.className = 'case ' + (r.pass ? 'pass' : 'fail');
    d.innerHTML = '<div><span class="tag">' + (r.pass ? 'PASS' : 'FAIL') + '</span> ' + r.name +
      '</div><div class="detail">' + r.detail + '</div>';
    out.appendChild(d);
  });
  var s = document.createElement('div');
  s.className = 'summary ' + (pass === results.length ? 'ok' : 'no');
  s.textContent = '결과: ' + pass + '/' + results.length + ' 통과 → ' + (pass === results.length ? '전체 통과' : '실패 존재');
  out.appendChild(s);
})();
</script>
</body>
</html>
